<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="CSS/one_page_website.css" />
    <script defer src="JavaScript/index.js"></script>
    <title>One Page Website</title>
  </head>
  <body>
    <div>
      <h1>Hello World</h1>
      <input type="text" placeholder="text" class="text-field" /> <br />

      <div class="grid">
        <img
          src="https://images.unsplash.com/photo-1772051858255-ce242fadaaa4?q=80&w=1664&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          width="400"
          height="400"
          class="italy lightbox-target"
        />
        <img
          src="https://images.unsplash.com/photo-1772090042075-6336af674f01?q=80&w=1472&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          height="400"
          width="400"
          class="dubai lightbox-target"
        />

        <img
          src="https://images.unsplash.com/photo-1771804359582-63cac0a77a8e?q=80&w=1374&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          height="400"
          width="400"
          class="tokyo lightbox-target"
        />

        <img
          src="https://images.unsplash.com/photo-1771915958327-a2264fc68fb0?q=80&w=1470&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          height="400"
          width="400"
          class="paris lightbox-target"
        />

        <img
          src="https://plus.unsplash.com/premium_photo-1673002094359-6e2de18bf37b?q=80&w=2940&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          height="400"
          width="400"
          class="iceland lightbox-target"
        />

        <img
          src="https://plus.unsplash.com/premium_photo-1688430696417-9223f4c1a1cf?q=80&w=2942&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          height="400"
          width="400"
          class="sanfran lightbox-target"
        />
      </div>

      <div id="lightboxModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImg" />
      </div>
    </div>
  </body>
</html>
